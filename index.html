<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#000000">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="TeleBeauty">
<title>TeleBeauty</title>
<link rel="manifest" href="manifest.json">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

html, body {
  width: 100%; height: 100%;
  background: #000;
  overflow: hidden;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
}

#app {
  width: 100vw; height: 100dvh;
  position: relative; overflow: hidden;
  background: #000;
}

/* ── CAMERA ── */
#video {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  object-fit: cover;
  transform: scaleX(-1);
}

/* ── TELEPROMPTER ── */
#prompter-zone {
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 38%;
  z-index: 10;
  background: linear-gradient(to bottom, rgba(0,0,0,0.72) 70%, transparent 100%);
  display: none;
  flex-direction: column;
  justify-content: flex-start;
  overflow: hidden;
  padding-top: calc(var(--safe-top) + 10px);
}
#prompter-zone.on { display: flex; }

#prompter-text {
  font-size: 26px;
  font-weight: 700;
  color: #fff;
  text-align: center;
  line-height: 1.55;
  padding: 0 20px;
  position: absolute;
  width: 100%;
  top: calc(var(--safe-top) + 10px);
}

/* speed bar inside prompter */
#speed-bar {
  position: absolute;
  bottom: 8px; left: 20px; right: 20px;
  display: flex; align-items: center; gap: 10px;
  pointer-events: all;
}
#speed-bar span { font-size: 11px; color: rgba(255,255,255,0.5); white-space: nowrap; }
#speed-slider {
  flex: 1; height: 3px;
  -webkit-appearance: none; appearance: none;
  background: rgba(255,255,255,0.25);
  border-radius: 2px; outline: none; cursor: pointer;
}
#speed-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 18px; height: 18px; border-radius: 50%;
  background: #fff; cursor: pointer;
  box-shadow: 0 0 4px rgba(0,0,0,0.4);
}

/* ── BOTTOM PANEL ── */
#bottom {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  z-index: 10;
  padding: 0 0 calc(var(--safe-bottom) + 16px);
  background: linear-gradient(to top, rgba(0,0,0,0.85) 60%, transparent 100%);
}

/* Filter strip */
#filter-strip {
  display: flex;
  overflow-x: auto;
  gap: 10px;
  padding: 10px 16px 6px;
  scrollbar-width: none;
}
#filter-strip::-webkit-scrollbar { display: none; }

.flt {
  flex-shrink: 0;
  display: flex; flex-direction: column; align-items: center; gap: 5px;
  cursor: pointer;
}
.flt-swatch {
  width: 48px; height: 48px;
  border-radius: 14px;
  border: 2.5px solid transparent;
  transition: border-color 0.2s;
}
.flt.active .flt-swatch { border-color: #fff; }
.flt span { font-size: 10px; color: rgba(255,255,255,0.7); letter-spacing: 0.2px; }
.flt.active span { color: #fff; font-weight: 600; }

/* Controls row */
#ctrl-row {
  display: flex; align-items: center; justify-content: space-around;
  padding: 10px 24px 6px;
}

.ctrl-btn {
  display: flex; flex-direction: column; align-items: center; gap: 5px;
  cursor: pointer;
}
.ctrl-btn .ic {
  width: 50px; height: 50px;
  border-radius: 16px;
  background: rgba(255,255,255,0.12);
  border: 1px solid rgba(255,255,255,0.18);
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s;
}
.ctrl-btn .ic svg { width: 22px; height: 22px; color: #fff; }
.ctrl-btn span { font-size: 10px; color: rgba(255,255,255,0.6); }
.ctrl-btn.on .ic { background: rgba(255,255,255,0.28); border-color: rgba(255,255,255,0.5); }
.ctrl-btn:active .ic { transform: scale(0.9); }

/* Record button */
#rec-btn {
  width: 72px; height: 72px; border-radius: 50%;
  background: rgba(255,255,255,0.15);
  border: 3px solid rgba(255,255,255,0.4);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: all 0.2s;
  position: relative;
}
#rec-btn::after {
  content: '';
  position: absolute; inset: -7px;
  border-radius: 50%;
  border: 1.5px solid rgba(255,255,255,0.15);
}
#rec-inner {
  width: 48px; height: 48px; border-radius: 50%;
  background: #ef4444;
  transition: all 0.25s;
  box-shadow: 0 0 16px rgba(239,68,68,0.5);
}
#rec-btn.recording #rec-inner {
  border-radius: 10px;
  width: 30px; height: 30px;
}
#rec-btn:active { transform: scale(0.94); }

/* Rec timer pill */
#rec-pill {
  position: absolute;
  top: calc(var(--safe-top) + 14px);
  left: 50%; transform: translateX(-50%);
  background: rgba(239,68,68,0.9);
  border-radius: 20px; padding: 5px 14px;
  font-size: 13px; font-weight: 700; color: #fff;
  display: none; align-items: center; gap: 7px;
  z-index: 15; white-space: nowrap;
}
#rec-pill.on { display: flex; }
#rec-dot { width: 8px; height: 8px; border-radius: 50%; background: #fff; animation: blink 1s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

/* Flip button */
#flip-btn {
  position: absolute;
  top: calc(var(--safe-top) + 14px); right: 16px;
  width: 40px; height: 40px; border-radius: 50%;
  background: rgba(0,0,0,0.35);
  border: 1px solid rgba(255,255,255,0.2);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; z-index: 15;
  color: #fff;
}
#flip-btn svg { width: 18px; height: 18px; }
#flip-btn:active { transform: scale(0.9); }

/* No camera state */
#no-cam {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 14px; color: rgba(255,255,255,0.6);
  text-align: center; padding: 40px;
  z-index: 5;
}
#no-cam p { font-size: 14px; line-height: 1.6; }
#no-cam button {
  background: #fff; color: #000;
  border: none; border-radius: 12px;
  padding: 13px 30px; font-size: 15px; font-weight: 600;
  cursor: pointer; margin-top: 6px;
}

/* Script panel */
#script-panel {
  position: absolute; inset: 0;
  background: #0a0a0a;
  z-index: 50; display: none;
  flex-direction: column;
  padding-top: var(--safe-top);
}
#script-panel.open { display: flex; }

.panel-hdr {
  display: flex; align-items: center; gap: 12px;
  padding: 16px 20px;
  border-bottom: 1px solid rgba(255,255,255,0.08);
}
.panel-hdr h3 { flex: 1; font-size: 17px; font-weight: 600; color: #fff; }
.back-btn {
  width: 34px; height: 34px;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; color: rgba(255,255,255,0.7);
}

.panel-body { flex: 1; display: flex; flex-direction: column; gap: 12px; padding: 16px 20px; overflow: hidden; }

#script-ta {
  flex: 1; background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 14px; color: #fff;
  font-size: 15px; line-height: 1.7;
  padding: 14px; resize: none; outline: none;
  font-family: inherit;
}
#script-ta:focus { border-color: rgba(255,255,255,0.3); }
#script-ta::placeholder { color: rgba(255,255,255,0.25); }

.save-btn {
  background: #fff; color: #000;
  border: none; border-radius: 14px;
  padding: 15px; font-size: 15px; font-weight: 700;
  cursor: pointer; letter-spacing: 0.3px;
}

/* Saved panel */
#saved-panel {
  position: absolute; inset: 0;
  background: #0a0a0a;
  z-index: 50; display: none;
  flex-direction: column;
  padding-top: var(--safe-top);
}
#saved-panel.open { display: flex; }
#saved-list { flex: 1; overflow-y: auto; padding: 16px 20px; display: flex; flex-direction: column; gap: 10px; }

.saved-item {
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 14px; padding: 14px 16px;
  display: flex; align-items: center; gap: 14px;
}
.saved-ic {
  width: 50px; height: 50px; border-radius: 12px;
  background: rgba(255,255,255,0.08);
  display: flex; align-items: center; justify-content: center;
  color: rgba(255,255,255,0.5); flex-shrink: 0;
}
.saved-info { flex: 1; min-width: 0; }
.saved-name { font-size: 14px; font-weight: 500; color: #fff; }
.saved-meta { font-size: 12px; color: rgba(255,255,255,0.4); margin-top: 3px; }
.saved-actions { display: flex; gap: 8px; }
.sav-btn {
  width: 36px; height: 36px;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 10px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: rgba(255,255,255,0.6); transition: all 0.2s;
}
.sav-btn:active { transform: scale(0.9); }

.empty {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 10px;
  color: rgba(255,255,255,0.25); padding: 40px; text-align: center;
}
.empty p { font-size: 14px; line-height: 1.6; }

/* Tab bar */
#tabbar {
  display: flex;
  background: rgba(15,15,15,0.9);
  border-top: 1px solid rgba(255,255,255,0.07);
  padding-bottom: calc(var(--safe-bottom) + 4px);
}
.tab {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; gap: 3px; padding: 10px 0;
  cursor: pointer; color: rgba(255,255,255,0.35);
  transition: color 0.2s; font-size: 10px;
}
.tab svg { width: 22px; height: 22px; }
.tab.on { color: #fff; }

/* Toast */
#toast {
  position: fixed; bottom: 110px; left: 50%;
  transform: translateX(-50%) translateY(8px);
  background: rgba(30,30,30,0.95);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 10px; padding: 9px 18px;
  font-size: 13px; color: #fff;
  z-index: 100; opacity: 0;
  transition: all 0.25s; white-space: nowrap;
  pointer-events: none;
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div id="app">

  <video id="video" autoplay muted playsinline></video>

  <div id="no-cam">
    <svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.4">
      <path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/>
      <circle cx="12" cy="13" r="4"/>
    </svg>
    <p>Camera access needed</p>
    <button onclick="startCam()">Enable Camera</button>
  </div>

  <!-- Teleprompter zone -->
  <div id="prompter-zone">
    <div id="prompter-text"></div>
    <div id="speed-bar">
      <span>Slow</span>
      <input type="range" id="speed-slider" min="5" max="150" value="40"
        oninput="onSpeedChange(this.value)">
      <span>Fast</span>
    </div>
  </div>

  <!-- Recording pill -->
  <div id="rec-pill">
    <div id="rec-dot"></div>
    <span id="rec-timer">0:00</span>
  </div>

  <!-- Flip -->
  <div id="flip-btn" onclick="flipCam()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M1 4v6h6M23 20v-6h-6"/>
      <path d="M20.49 9A9 9 0 005.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 013.51 15"/>
    </svg>
  </div>

  <!-- Bottom panel -->
  <div id="bottom">
    <!-- Filter strip -->
    <div id="filter-strip"></div>

    <!-- Controls -->
    <div id="ctrl-row">
      <div class="ctrl-btn" id="btn-prompter" onclick="togglePrompter()">
        <div class="ic">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="2" y="3" width="20" height="14" rx="2"/>
            <path d="M8 21h8M12 17v4M7 8h10M7 12h6"/>
          </svg>
        </div>
        <span>Prompter</span>
      </div>

      <div id="rec-btn" onclick="toggleRec()">
        <div id="rec-inner"></div>
      </div>

      <div class="ctrl-btn" id="btn-smooth" onclick="toggleSmooth()">
        <div class="ic">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/>
            <path d="M8 14s1.5 2 4 2 4-2 4-2M9 9h.01M15 9h.01"/>
          </svg>
        </div>
        <span>Smooth</span>
      </div>
    </div>

    <!-- Tab bar -->
    <div id="tabbar">
      <div class="tab on" id="tab-cam" onclick="showTab('cam')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/>
          <circle cx="12" cy="13" r="4"/>
        </svg>
        Camera
      </div>
      <div class="tab" id="tab-saved" onclick="showTab('saved')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polygon points="5,3 19,12 5,21"/>
        </svg>
        Saved
      </div>
      <div class="tab" id="tab-script" onclick="showTab('script')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
          <polyline points="14,2 14,8 20,8"/>
          <line x1="8" y1="13" x2="16" y2="13"/>
          <line x1="8" y1="17" x2="13" y2="17"/>
        </svg>
        Script
      </div>
    </div>
  </div>

  <!-- Script panel -->
  <div id="script-panel">
    <div class="panel-hdr">
      <div class="back-btn" onclick="closePanel('script')">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6L6 18M6 6l12 12"/></svg>
      </div>
      <h3>Script Editor</h3>
    </div>
    <div class="panel-body">
      <textarea id="script-ta" placeholder="Type or paste your script here...

TeleBeauty will scroll this text on screen while you record."></textarea>
      <button class="save-btn" onclick="saveScript()">Save & Use Script</button>
    </div>
  </div>

  <!-- Saved panel -->
  <div id="saved-panel">
    <div class="panel-hdr">
      <div class="back-btn" onclick="closePanel('saved')">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6L6 18M6 6l12 12"/></svg>
      </div>
      <h3>Saved Recordings</h3>
    </div>
    <div id="saved-list"></div>
  </div>

  <div id="toast"></div>
</div>

<script>
// ── State ──────────────────────────────────────────
let stream = null;
let isFront = true;
let mediaRecorder = null;
let recChunks = [];
let recordings = [];
let isRec = false;
let recSec = 0;
let recTimer = null;
let prompterOn = false;
let prompterInterval = null;
let prompterOffset = 0;
let scriptText = localStorage.getItem('tb_script') || '';
let smoothOn = false;
let activeFilter = 0;
let speed = 40;

// ── Filters ────────────────────────────────────────
const FILTERS = [
  { name: 'No Filter',     css: 'none',                                        bg: '#888' },
  { name: 'Sun-Kissed',    css: 'sepia(0.35) saturate(1.3) brightness(1.08)',  bg: '#c8845a' },
  { name: 'Cotton Candy',  css: 'hue-rotate(320deg) saturate(1.2) brightness(1.1)', bg: '#e8a0c0' },
  { name: 'Fresh Face',    css: 'brightness(1.15) contrast(0.92) saturate(0.9)', bg: '#f5c8a0' },
  { name: 'Pop',           css: 'saturate(1.6) contrast(1.1)',                 bg: '#e86060' },
  { name: 'Vitality',      css: 'saturate(1.4) brightness(1.05) hue-rotate(5deg)', bg: '#d4785a' },
  { name: 'Pink',          css: 'hue-rotate(330deg) saturate(1.3) brightness(1.08)', bg: '#e890a8' },
  { name: 'Ruddy',         css: 'sepia(0.2) saturate(1.5) hue-rotate(350deg)', bg: '#c86858' },
  { name: 'Lively',        css: 'saturate(1.5) contrast(1.05) brightness(1.05)', bg: '#d89060' },
  { name: 'Elegant',       css: 'saturate(0.8) contrast(1.1) brightness(1.05)', bg: '#b09898' },
];

function buildFilters() {
  const strip = document.getElementById('filter-strip');
  strip.innerHTML = FILTERS.map((f, i) => `
    <div class="flt ${i===0?'active':''}" onclick="applyFilter(${i})">
      <div class="flt-swatch" style="background:${f.bg};"></div>
      <span>${f.name}</span>
    </div>
  `).join('');
}

function applyFilter(i) {
  activeFilter = i;
  document.querySelectorAll('.flt').forEach((el, idx) => el.classList.toggle('active', idx === i));
  updateVideoFilter();
}

function updateVideoFilter() {
  const f = FILTERS[activeFilter];
  let css = f.css === 'none' ? '' : f.css;
  if (smoothOn) css += ' blur(0.7px) brightness(1.04)';
  document.getElementById('video').style.filter = css || 'none';
}

function toggleSmooth() {
  smoothOn = !smoothOn;
  document.getElementById('btn-smooth').classList.toggle('on', smoothOn);
  updateVideoFilter();
  toast(smoothOn ? 'Smooth skin on' : 'Smooth skin off');
}

// ── Camera ─────────────────────────────────────────
async function startCam() {
  try {
    if (stream) stream.getTracks().forEach(t => t.stop());
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: isFront ? 'user' : 'environment', width:{ideal:1280}, height:{ideal:720} },
      audio: true
    });
    const vid = document.getElementById('video');
    vid.srcObject = stream;
    vid.style.transform = isFront ? 'scaleX(-1)' : 'scaleX(1)';
    document.getElementById('no-cam').style.display = 'none';
  } catch(e) {
    toast('Camera permission denied');
  }
}

async function flipCam() {
  isFront = !isFront;
  await startCam();
}

// ── Recording ──────────────────────────────────────
function toggleRec() {
  if (!stream) { startCam(); return; }
  isRec ? stopRec() : startRec();
}

function startRec() {
  recChunks = [];
  const mime = MediaRecorder.isTypeSupported('video/webm;codecs=vp9,opus')
    ? 'video/webm;codecs=vp9,opus' : 'video/webm';
  mediaRecorder = new MediaRecorder(stream, { mimeType: mime });
  mediaRecorder.ondataavailable = e => { if (e.data.size > 0) recChunks.push(e.data); };
  mediaRecorder.onstop = finishRec;
  mediaRecorder.start(100);
  isRec = true;
  recSec = 0;
  document.getElementById('rec-btn').classList.add('recording');
  document.getElementById('rec-pill').classList.add('on');
  recTimer = setInterval(() => {
    recSec++;
    const m = Math.floor(recSec/60), s = recSec%60;
    document.getElementById('rec-timer').textContent = m+':'+(s<10?'0':'')+s;
  }, 1000);
}

function stopRec() {
  mediaRecorder && mediaRecorder.stop();
  isRec = false;
  clearInterval(recTimer);
  document.getElementById('rec-btn').classList.remove('recording');
  document.getElementById('rec-pill').classList.remove('on');
}

function finishRec() {
  const blob = new Blob(recChunks, { type: 'video/webm' });
  const url = URL.createObjectURL(blob);
  const now = new Date();
  recordings.unshift({
    url, dur: recSec,
    name: 'Take ' + (recordings.length+1),
    date: now.toLocaleDateString()
  });
  renderSaved();
  toast('Recording saved!');
}

// ── Teleprompter ───────────────────────────────────
function togglePrompter() {
  prompterOn = !prompterOn;
  document.getElementById('btn-prompter').classList.toggle('on', prompterOn);
  const zone = document.getElementById('prompter-zone');
  zone.classList.toggle('on', prompterOn);
  if (prompterOn) {
    loadPrompt();
    startScroll();
  } else {
    stopScroll();
  }
}

function loadPrompt() {
  const el = document.getElementById('prompter-text');
  el.textContent = scriptText || 'No script yet. Go to Script tab to add one.';
  prompterOffset = 0;
  el.style.transform = 'translateY(0)';
}

function startScroll() {
  stopScroll();
  const el = document.getElementById('prompter-text');
  const zone = document.getElementById('prompter-zone');
  prompterInterval = setInterval(() => {
    const spd = parseInt(document.getElementById('speed-slider').value) / 800;
    prompterOffset -= spd;
    const max = -(el.scrollHeight + 40);
    if (prompterOffset < max) prompterOffset = zone.clientHeight;
    el.style.transform = `translateY(${prompterOffset}px)`;
  }, 16);
}

function stopScroll() {
  clearInterval(prompterInterval);
}

function onSpeedChange(val) {
  speed = parseInt(val);
}

// ── Script ─────────────────────────────────────────
function saveScript() {
  scriptText = document.getElementById('script-ta').value;
  localStorage.setItem('tb_script', scriptText);
  closePanel('script');
  toast('Script saved!');
  if (prompterOn) { loadPrompt(); startScroll(); }
}

// ── Saved recordings ───────────────────────────────
function renderSaved() {
  const list = document.getElementById('saved-list');
  if (!recordings.length) {
    list.innerHTML = `<div class="empty">
      <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.3"><polygon points="5,3 19,12 5,21"/></svg>
      <p>No recordings yet.<br>Hit the red button to start!</p>
    </div>`;
    return;
  }
  list.innerHTML = recordings.map((r,i) => `
    <div class="saved-item">
      <div class="saved-ic">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5,3 19,12 5,21"/></svg>
      </div>
      <div class="saved-info">
        <div class="saved-name">${r.name}</div>
        <div class="saved-meta">${r.date} · ${Math.floor(r.dur/60)}:${(r.dur%60<10?'0':'')+r.dur%60}</div>
      </div>
      <div class="saved-actions">
        <div class="sav-btn" onclick="playRec(${i})">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polygon points="5,3 19,12 5,21"/></svg>
        </div>
        <div class="sav-btn" onclick="dlRec(${i})">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
        </div>
      </div>
    </div>
  `).join('');
}

function playRec(i) {
  const w = window.open('','_blank');
  w.document.write(`<html><body style="margin:0;background:#000;display:flex;align-items:center;justify-content:center;height:100vh"><video src="${recordings[i].url}" controls autoplay style="max-width:100%;max-height:100%"></video></body></html>`);
}

function dlRec(i) {
  const a = document.createElement('a');
  a.href = recordings[i].url;
  a.download = recordings[i].name.replace(/\s/g,'_') + '.webm';
  a.click();
  toast('Downloading...');
}

// ── Tabs / Panels ──────────────────────────────────
function showTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('on'));
  document.getElementById('tab-'+tab).classList.add('on');
  if (tab === 'script') {
    document.getElementById('script-ta').value = scriptText;
    document.getElementById('script-panel').classList.add('open');
  }
  if (tab === 'saved') {
    renderSaved();
    document.getElementById('saved-panel').classList.add('open');
  }
  if (tab === 'cam') {
    document.getElementById('script-panel').classList.remove('open');
    document.getElementById('saved-panel').classList.remove('open');
  }
}

function closePanel(name) {
  document.getElementById(name+'-panel').classList.remove('open');
  document.getElementById('tab-cam').classList.add('on');
  document.getElementById('tab-'+name).classList.remove('on');
}

// ── Toast ──────────────────────────────────────────
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2000);
}

// ── Init ───────────────────────────────────────────
buildFilters();
startCam();

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}
</script>
</body>
</html>
